<!DOCTYPE html>
<html lang="en">
    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 min-h-screen flex justify-center items-center">
   <div class="bg-white shadow-lg rounded-xl p-6 w-[700px]">
    <h1 class="text-center text-3xl font-bold mb-8">Weather Information</h1>
   <div class="flex flex-col">
    <input class="border-2 outline-none w-[400px] mx-auto rounded-xl px-3 caret-blue-400- hover:bg-gray-200 ring-blue-400 ring-1" type="text" id="input">
    <button class="bg-blue-600 w-[150px] text-white font-bold text-md px-2 rounded-xl mt-2 mx-auto hover:bg-blue-500 hover:transition" id="btn">Get Weather</button>
   </div>
    <div class="mt-5 min-h-[200px] border rounded-lg p-4 bg-gray-50 whitespace-pre-wrap" id="div"></div>
   </div>

    <script src="base.js"></script>
</body>
</html>
